<script>
	document.addEventListener("DOMContentLoaded", () => {
  gsap.registerPlugin(ScrollTrigger);

  function getAutoHeight(element) {
      gsap.set(element, { height: "auto" });
      const height = element.offsetHeight;
      gsap.set(element, { height: 0 }); 
      return height;
  }

  let masterTl; 
  let dropTl; 

  function initGSAP() {
      // Clean up ONLY this section's timelines on resize
      if (masterTl) {
          if (masterTl.scrollTrigger) masterTl.scrollTrigger.kill();
          masterTl.kill();
      }
      if (dropTl) {
          if (dropTl.scrollTrigger) dropTl.scrollTrigger.kill();
          dropTl.kill();
      }
      
      gsap.set(".ball, .acc-item, .acc-content, .acc-header > span, .visual-item, li, .dotted-slot, .three-ball-hide", { clearProps: "all" });
      
      // CRITICAL FIX: Ensure balls can visually break out of their containers and sit on top of the bottom section
      gsap.set(".acc-item, .acc-header", { overflow: "visible" });
      gsap.set(".ball", { zIndex: 9999, position: "relative" });

      if (window.innerWidth <= 767) return;

     // Scope everything to the desktop container to ignore hidden mobile elements
const desktopContainer = document.querySelector(".tabing-scroll-track");

const accItems = desktopContainer.querySelectorAll(".acc-item");
const visuals = desktopContainer.querySelectorAll(".visual-item");
const balls = desktopContainer.querySelectorAll(".ball");
// hideBalls live in the upper section, so we scope them to their specific container
const hideBalls = document.querySelectorAll(".starting-balls-container .three-ball-hide");
      
//       const caseBoxes = [
//           document.querySelector(".case_study_box1"),
//           document.querySelector(".case_study_box2"),
//           document.querySelector(".case_study_box3")
//       ];

      if (!accItems.length || !balls.length) return; 

      const headerHeight = document.querySelector(".acc-header").offsetHeight;
      const accItemStyle = window.getComputedStyle(accItems[0]);
      const marginBottom = parseFloat(accItemStyle.marginBottom) || 0;
      const slideUpDistance = headerHeight + marginBottom;

      balls.forEach((ball, index) => {
          const ballRect = ball.getBoundingClientRect();
          let diffStartX = 0;
          let diffStartY = 0;

          if (hideBalls[index]) {
              const hideRect = hideBalls[index].getBoundingClientRect();
              diffStartX = (hideRect.left + hideRect.width / 2) - (ballRect.left + ballRect.width / 2);
              diffStartY = (hideRect.top + hideRect.height / 2) - (ballRect.top + ballRect.height / 2);
          }
          
          gsap.set(ball, { 
              x: diffStartX, 
              y: diffStartY, 
              opacity: 0, 
              scale: 0.4, 
              borderRadius: "50%" 
          });
      });

      // TIMELINE 1: THE DROP 
      dropTl = gsap.timeline({
          scrollTrigger: {
              trigger: ".tabing-scroll-track .personal-tabing-section",
              start: "top 55%",
              end: "top top", 
              scrub: 1,
			  invalidateOnRefresh: true,
          }
      });

      dropTl.to(hideBalls, { opacity: 0, duration: 0.01 }, 0)
            .to(balls, { opacity: 1, duration: 0.01 }, 0)
            .to(balls, { 
                x: 0, 
                y: 0, 
                scale: 1, 
                borderRadius: "7px", 
                duration: 1, 
                ease: "power2.out" 
            }, 0);


      // TIMELINE 2: THE ACCORDION & FINAL DROP
      masterTl = gsap.timeline({
          scrollTrigger: {
              trigger: ".tabing-scroll-track", 
              start: "top top", 
              end: "bottom bottom", 
              scrub: 1, 
              invalidateOnRefresh: true 
          }
      });

      masterTl.addLabel("start");

      accItems.forEach((item, index) => {
          const content = item.querySelector(".acc-content");
          const lis = content.querySelectorAll("li");
          const h = getAutoHeight(content);
          const vis = visuals[index];
          const span = item.querySelector(".acc-header > span");
          const targetColor = item.getAttribute("data-color") || "#000";
          
          let phaseLabel = "phase" + index;

          if (index === 0) {
              masterTl.addLabel(phaseLabel, "start+=0.1") 
                .to(span, { color: targetColor, duration: 0.3 }, phaseLabel)
                .to(content, { height: h, duration: 0.6, ease: "power2.inOut" }, phaseLabel)
                .to(vis, { opacity: 1, scale: 1, duration: 0.6, ease: "power2.out" }, phaseLabel)
                .to(lis, { x: 0, opacity: 1, duration: 0.4, stagger: 0.1, ease: "power2.out" }, phaseLabel + "+=0.2");
          } else {
              let prevItem = accItems[index - 1];
              let prevContent = prevItem.querySelector(".acc-content");
              let prevLis = prevContent.querySelectorAll("li");
              let prevVis = visuals[index - 1];
              let prevSpan = prevItem.querySelector(".acc-header > span");
              let prevSlot = prevItem.querySelector(".dotted-slot");
              let prevBall = prevItem.querySelector(".ball");

              masterTl.addLabel(phaseLabel, "+=0.5")
                .to(prevLis, { opacity: 0, x: -20, duration: 0.3, stagger: -0.05 }, phaseLabel)
                .to(prevContent, { height: 0, duration: 0.6, ease: "power2.inOut" }, phaseLabel + "+=0.2")
                .to(prevSpan, { opacity: 0, duration: 0.6, ease: "power2.inOut" }, phaseLabel + "+=0.2")
                .to(prevSlot, { borderColor: "transparent", duration: 0.6, ease: "power2.inOut" }, phaseLabel + "+=0.2")
                .to(prevBall, { opacity: 0, duration: 0.1, ease: "power2.inOut" }, phaseLabel + "+=0.2") // Hides previous ball
                .to(prevItem, { marginTop: -slideUpDistance, duration: 0.6, ease: "power2.inOut" }, phaseLabel + "+=0.2")
                .to(prevVis, { opacity: 0, scale: 0.95, duration: 0.4 }, phaseLabel)
                .to(span, { color: targetColor, duration: 0.3 }, phaseLabel + "+=0.2")
                .to(content, { height: h, duration: 0.6, ease: "power2.inOut" }, phaseLabel + "+=0.2")
                .to(vis, { opacity: 1, scale: 1, duration: 0.6, ease: "power2.out" }, phaseLabel + "+=0.2")
                .to(lis, { x: 0, opacity: 1, duration: 0.4, stagger: 0.1, ease: "power2.out" }, phaseLabel + "+=0.4");
          }
      });

      // OUTRO PHASE: ACCORDION CLOSES
      const lastIdx = accItems.length - 1;
      const lastItem = accItems[lastIdx];
      const lastContent = lastItem.querySelector(".acc-content");
      const lastLis = lastContent.querySelectorAll("li");
      const lastVis = visuals[lastIdx];
      const lastSpan = lastItem.querySelector(".acc-header > span");
      const lastSlot = lastItem.querySelector(".dotted-slot");

      masterTl.addLabel("outro", "+=0.5")
        .to(lastLis, { opacity: 1, x: -20, duration: 0.3, stagger: -0.05 }, "outro")
        .to(lastContent, { height: auto, duration: 0.6, ease: "power2.inOut" }, "outro+=0.2")
        .to(lastSpan, { opacity: 1, duration: 0.6, ease: "power2.inOut" }, "outro+=0.2")
        .to(lastSlot, { borderColor: "transparent", duration: 0.6, ease: "power2.inOut" }, "outro+=0.2")
        .to(lastVis, { opacity: 1, scale: 0.95, duration: 0.4 }, "outro");

      // FINAL PHASE: ALL 3 BALLS FLY DOWN TO CASE STUDY BOXES
      balls.forEach((ball, i) => {
          if (!caseBoxes[i]) return;

          // 1. Force all balls back to full opacity instantly before they move
          masterTl.to(ball, { opacity: 1, duration: 0.01 }, "outro");

          // 2. Fly downwards to the exact center of the new divs
          masterTl.to(ball, {
              x: () => {
                  const boxRect = caseBoxes[i].getBoundingClientRect();
                  const ballRect = ball.getBoundingClientRect();
                  return gsap.getProperty(ball, "x") + (boxRect.left + boxRect.width / 2) - (ballRect.left + ballRect.width / 2);
              },
              y: () => {
                  const boxRect = caseBoxes[i].getBoundingClientRect();
                  const ballRect = ball.getBoundingClientRect();
                  return gsap.getProperty(ball, "y") + (boxRect.top + boxRect.height / 2) - (ballRect.top + ballRect.height / 2);
              },
              scale: 1.5,
              duration: 0.8, 
              ease: "power1.inOut" 
          }, "outro+=0.1"); 
      });
  }

  window.addEventListener("load", initGSAP);

  let resizeTimer;
  window.addEventListener("resize", () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => {
          initGSAP(); 
          ScrollTrigger.refresh(); 
      }, 250); 
  });
	});
</script>

<!-- GHOST ball on desktop -->
<script>
document.addEventListener("DOMContentLoaded", () => {
      gsap.registerPlugin(ScrollTrigger);

      // 1. Initialize GSAP MatchMedia
      let mm = gsap.matchMedia();

      // 2. Wrap your entire logic inside the desktop breakpoint (768px and up)
      mm.add("(min-width: 768px)", () => {
          
          // Colors matching your layout
          const colors = ['#002A54', '#FFA106', '#1DB7D1'];
          const ghostBalls = [];

          // Create the Ghost Balls
          for (let i = 0; i < 3; i++) {
              let ball = document.createElement('div');
              ball.classList.add('ghost-ball'); 
              ball.style.width = '30px';  
              ball.style.height = '30px'; 
              ball.style.backgroundColor = colors[i];
              
              ball.style.position = 'fixed'; 
              ball.style.top = '0px';   
              ball.style.left = '0px';  
              
              ball.style.borderRadius = '7px'; 
              ball.style.zIndex = '999999';
              ball.style.opacity = '0'; // Keeps them completely hidden before scrolling
              ball.style.pointerEvents = 'none'; 
              
              document.body.appendChild(ball);
              ghostBalls.push(ball);
          }

          function initGhostTransition() {
              // CHANGE THESE to the classes/IDs of your bottom semi-circle elements
              const endTargets = [
                  document.querySelector(".case_study_box_ball1"), // Replace with your actual class
                  document.querySelector(".case_study_box_ball2"), // Replace with your actual class
                  document.querySelector(".case_study_box_ball3")      // Replace with your actual class
              ];
              
              // Where they spawn from (Left side text elements)
              const startTargets = document.querySelectorAll(".acc-header");

              if (!endTargets[0] || !startTargets.length) return;

              // The scroll timeline for the jump
              let bridgeTl = gsap.timeline({
                  scrollTrigger: {
                      trigger: ".tabing-scroll-track", 
                      start: "bottom 80%", 
                      endTrigger: endTargets[0], // End when the first bottom target is reached
                      end: "top 30%", 
                      scrub: 1,
                      invalidateOnRefresh: true 
                  }
              });

              // Animate each ghost ball at the EXACT SAME TIME
              ghostBalls.forEach((ball, i) => {
                  if (!endTargets[i] || !startTargets[i]) return;

                  // Instantly make them visible ONLY when the scroll timeline begins
                  bridgeTl.to(ball, { opacity: 1, duration: 0.01 }, 0);

                  bridgeTl.fromTo(ball, {
                      scale: 1,
                      borderRadius: "7px",
                      x: () => {
                          const rect = startTargets[i].getBoundingClientRect();
                          return rect.left + 30; 
                      },
                      y: () => {
                          const rect = startTargets[i].getBoundingClientRect();
                          return rect.top + (rect.height / 2) - 15; 
                      }
                  }, {
                      scale: 1.5,
                      borderRadius: "50%",
                      x: () => {
                          const rect = endTargets[i].getBoundingClientRect();
                          // Keep horizontal center alignment
                          return rect.left + (rect.width / 2) - 15; 
                      },
                      y: () => {
                          const rect = endTargets[i].getBoundingClientRect();
                          // CHANGED: Aim for the top edge of the semi-circle instead of the middle
                          return rect.top - 10; 
                      },
                      ease: "power1.out", 
                      duration: 2
                  }, 0); 
                  
                  // CHANGED: Instantly disappear just before it finishes the movement into the space
                  bridgeTl.to(ball, { opacity: 0, duration: 0.01 }, "-=0.15");
              });
          }

          initGhostTransition();

          // Refresh math on window resize
          let resizeTimer;
          const handleResize = () => {
              clearTimeout(resizeTimer);
              resizeTimer = setTimeout(() => {
                  ScrollTrigger.refresh();
              }, 250);
          };
          window.addEventListener("resize", handleResize);

          // 3. CLEANUP FUNCTION (Runs automatically if window drops below 768px)
          return () => {
              ghostBalls.forEach(ball => {
                  if (ball.parentNode) {
                      ball.parentNode.removeChild(ball);
                  }
              });
              window.removeEventListener("resize", handleResize);
          };
      });
  });
</script>

                  document.querySelector(".caseStudySwiper .case_study_box_ball2"),
                  document.querySelector(".caseStudySwiper .case_study_box_ball3")
              ];
              
              if (!caseBoxes[0]) return;

              // 1. Updated ScrollTrigger to fire at 80% completion
              let bridgeTl = gsap.timeline({
                  scrollTrigger: {
                      trigger: ".mobile-sticky-track", 
                      // Starts when the viewport bottom hits 80% of the 300vh track
                      start: "90% bottom", 
                      // Ends when the bottom of the track reaches the top of the screen
                      end: "bottom top", 
                      scrub: 1,
                      invalidateOnRefresh: true 
                  }
              });

              ghostBalls.forEach((ball, i) => {
                  if (!caseBoxes[i]) return;

                  bridgeTl.to(ball, { opacity: 1, duration: 0.01 }, 0);

                  // 2. Updated Coordinates to match the drawn red lines (coming from top-left)
                  bridgeTl.fromTo(ball, {
                      scale: 1,
                      // Start at top-left edge of the screen (x: 0, y: 0)
                      x: (window.innerWidth * 0.1) * i, // Spreads them slightly at the top
                      y: -20 // Starts just above the visible viewport
                  }, {
                      scale: 1.5,
                      x: () => {
                          const rect = caseBoxes[i].getBoundingClientRect();
                          return rect.left + (rect.width / 2) - 10;
                      },
                      y: () => {
                          const rect = caseBoxes[i].getBoundingClientRect();
                          return rect.top + (rect.height / 2) - 10; 
                      },
                      ease: "power2.inOut", 
                      duration: 2
                  }, 0); 
                  
                  // Mix/fade into the box at the end
                  bridgeTl.to(ball, { opacity: 0, duration: 0.5 }, "+=0.1");
              });
          }

          setTimeout(initGhostTransition, 100);

          let resizeTimer;
          const handleResize = () => {
              clearTimeout(resizeTimer);
              resizeTimer = setTimeout(() => {
                  ScrollTrigger.refresh();
              }, 250);
          };
          window.addEventListener("resize", handleResize);

          return () => {
              ghostBalls.forEach(ball => {
                  if (ball.parentNode) {
                      ball.parentNode.removeChild(ball);
                  }
              });
              window.removeEventListener("resize", handleResize);
          };
      });
  });
</script>

      const stepDistance = 290;

        gsap.to(numbersTrack, {
          y: -(index * stepDistance),
          duration: 0.5,
          ease: "power2.out",
          overwrite: "auto" // Prevents stuttering if you scroll really fast

              trigger: section,

              end: "bottom 50%",
              onEnter: () => updateActiveStage(index),
              onEnterBack: () => updateActiveStage(index)
            });
          });

          // MAGIC FIX: Re-sort triggers by physical DOM order and recalculate all heights
          ScrollTrigger.sort();
          ScrollTrigger.refresh();
      }, 100); 

      // CLEANUP FUNCTION: This runs automatically if the user resizes below 768px
      return () => {
        // Reset the track position
        if (numbersTrack) {
            gsap.set(numbersTrack, { clearProps: "y" }); 
        }

<script>
  document.addEventListener("DOMContentLoaded", () => {
    gsap.registerPlugin(ScrollTrigger);

    // 1. Get the starting, ending, and target elements
    const h2 = document.querySelector('.circle h2');
    const endEl = document.querySelector('.center_logo');
    const logoImg = document.querySelector('.center_logo img'); 

    // Create a GSAP matchMedia instance
    let mm = gsap.matchMedia();

    // The code inside this block will only run when the screen is 768px or wider
    mm.add("(min-width: 768px)", () => {
      
      // 2. Create the bubble ball dynamically and prepend it to the h2
      const bubbleBall = document.createElement('div');
      bubbleBall.className = 'bubble-ball';
      
      // Ensure the h2 can hold the absolute positioned ball behind its text
      h2.style.zIndex = '1';
      h2.prepend(bubbleBall);

      // 3. Helper function to get the responsive distance (Delta)
      const getTargetDelta = () => {
        if (!endEl || !h2) return { x: 0, y: 0 };
        const startRect = h2.getBoundingClientRect();
        const endRect = endEl.getBoundingClientRect();
        
        const startX = startRect.left + startRect.width / 2;
        const startY = startRect.top + startRect.height / 2;
        const endX = endRect.left + endRect.width / 2;
        const endY = endRect.top + endRect.height / 2;
        
        return { 
          x: endX - startX, 
          y: endY - startY 
        };
      };

      // 4. Set the initial starting state for the ball
      gsap.set(bubbleBall, {
        position: "absolute",
        top: "50%",
        left: "50%",
        xPercent: -50,
        yPercent: -50,
        width: 230,
        height: 230, 
        opacity: 1,
        backgroundColor: "#32312f", 
        borderRadius: "50%",
        zIndex: -1 
      });

      // Move the logo up to the starting h2 position so it can travel down
      gsap.set(logoImg, {
        x: () => -getTargetDelta().x,
        y: () => -getTargetDelta().y,
        scale: 0.5, 
        opacity: 0
      });

      // 5. Create the Timeline (paused by default)
      const tl = gsap.timeline({ paused: true });

      // A. Ball Movement
      tl.to(bubbleBall, {
        x: () => getTargetDelta().x,
        y: () => getTargetDelta().y,
        scale: 1.6, 
        ease: "power2.out", 
        duration: 3       
      }, 0);

      // B. Logo Movement (Moves exactly with the ball)
      tl.to(logoImg, {
        x: 0,
        y: 0,
        ease: "power2.out",
        duration: 3
      }, 0);

      // C. The Shape Morph
      tl.to(bubbleBall, {
        borderRadius: "3%", 
        ease: "power2.out",
        duration: 3
      }, 0);

      // D. The Fast Color Change
      tl.to(bubbleBall, {
        background: "#ffffff",
        ease: "none",
        duration: 0.6       
      }, 0);

      // E. Logo fades in partially as it travels
      tl.to(logoImg, {
        opacity: 0.4,
        scale: 0.8,
        duration: 1.5,
        ease: "none"
      }, 0);

      tl.to(bubbleBall, {
        opacity: 0.4,
        duration: 1.5,
        ease: "none"
      }, 0);

      // F. Logo reaches full 100% opacity as it lands in the box
      tl.to(logoImg, {
        opacity: 1,
        scale: 1,
        duration: 1.5,
        ease: "power2.out"
      }, 1.5); 

      tl.to(bubbleBall, {
        opacity: 1,
        duration: 1.2,
        ease: "power3.out"
      }, 1.2); 

      // 6. Connect the Timeline to ScrollTrigger
      ScrollTrigger.create({
        trigger: ".circle",          
        start: "bottom 50%",         
        invalidateOnRefresh: true,
        onEnter: () => {
          tl.timeScale(1).play(); 
        },
        onLeaveBack: () => {
          tl.timeScale(4).reverse(); 
        }
      });

      // 7. CLEANUP FUNCTION (Crucial for matchMedia)
      // This fires automatically if the window is resized below 768px
      return () => {
        bubbleBall.remove(); // Removes the dynamically added DOM element
        gsap.set([logoImg, h2], { clearProps: "all" }); // Clears inline styles GSAP added
      };

    }); // End of matchMedia block

  });
</script>

<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

<script>
jQuery(document).ready(function($) {
    
    function initMobileSelect2() {
        if (window.innerWidth <= 768) {
            var $field = $('#input_114_61');

            if ($field.length) {
                
                // Only initialize if it hasn't been done yet
                if (!$field.hasClass('select2-hidden-accessible')) {
                    if ($field.find('option').first().val() !== '') {
                        $field.prepend('<option value=""></option>');
                    }

                    $field.select2({
                        placeholder: "Services looking for",
                        allowClear: true,
                        width: '99%'
                    });
                }

                // THE FIX: Directly target the generated Select2 textarea and force the placeholder
                $field.next('.select2-container').find('.select2-search__field').attr('placeholder', 'Services looking for');
            }
        }
    }

    // 1. Run on initial page load
    // Adding a slight timeout ensures we run *after* any native Gravity Forms scripts finish
    setTimeout(initMobileSelect2, 100);

    // 2. Run again if Gravity Forms reloads the form via AJAX
    $(document).on('gform_post_render', function(event, form_id, current_page){
        if(form_id == 114) {
            setTimeout(initMobileSelect2, 100);
        }
    });
});
</script>
